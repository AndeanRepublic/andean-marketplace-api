name: NestJS CI/CD to Railway (pnpm)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------------------------------------
  # ETAPA 1: Integración Continua (CI)
  # ----------------------------------------------------
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 📦 Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.15.1 # Misma versión que tu Dockerfile

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Misma versión que tu Dockerfile
          cache: 'pnpm'

      - name: 📥 Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: 🔍 Ejecutar Linter
        run: pnpm run lint

      - name: 🧪 Ejecutar Pruebas (Unit tests)
        run: pnpm run test:e2e

      - name: 🏗️ Compilar el proyecto NestJS
        run: pnpm run build

  # ----------------------------------------------------
  # ETAPA 2: Despliegue Continuo (CD)
  # ----------------------------------------------------
  cd:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🚂 Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: 🚢 Desplegar a Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
