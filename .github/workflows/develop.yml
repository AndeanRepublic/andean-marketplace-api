name: CI/CD Develop → Railway (Test)

on:
  push:
    branches:
      - develop

jobs:
  # ----------------------------------------------------
  # ETAPA 1: Type Check + Tests
  # ----------------------------------------------------
  ci:
    name: Type Check & Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 📦 Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.15.1

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 📥 Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: 🔎 Type Check
        run: pnpm exec tsc --noEmit

      - name: 🧪 Ejecutar Pruebas (E2E)
        run: pnpm run test:e2e

  # ----------------------------------------------------
  # ETAPA 2: Deploy a Railway (servicio test)
  # ----------------------------------------------------
  deploy-test:
    name: Deploy → Railway Test
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 🚂 Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: 🚀 Desplegar a Railway (test)
        run: railway up --service andean-marketplace-api-test --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
